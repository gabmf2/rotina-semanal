<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotina Semanal</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  /* Base */
  --bg:#07070e;
  --bg-2:#0b0b16;
  --glass:rgba(22,22,38,0.55);
  --glass-2:rgba(30,30,50,0.45);
  --solid:#13131f;
  --bd:rgba(255,255,255,0.08);
  --bd-2:rgba(255,255,255,0.14);
  --tx:#ececf7;
  --tx-dim:#9999b8;
  --tx-faint:#5e5e7d;

  /* Neon */
  --cyan:#00e5ff;
  --green:#00ff9d;
  --amber:#ffb52e;
  --magenta:#d65cff;
  --lime:#b6ff3c;
  --pink:#ff3d8b;

  --font:'Calibri','Segoe UI',system-ui,sans-serif;
  --font-display:var(--font);   /* fonte de destaque (títulos, relógio, números) */
  --r:14px; --r-sm:9px;
}

/* ── accent helper: each element carries --ac ── */
.push   {--ac:var(--cyan);}
.pull   {--ac:var(--green);}
.legs   {--ac:var(--amber);}
.estudo {--ac:var(--magenta);}
.leitura{--ac:var(--lime);}
.neutro {--ac:var(--tx-dim);}

html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--tx);
  line-height:1.5;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}
/* atmosphere */
body::before{
  content:'';position:fixed;inset:0;z-index:-2;
  background:
    radial-gradient(closest-side at 12% 8%, rgba(0,229,255,0.16), transparent 70%),
    radial-gradient(closest-side at 88% 4%, rgba(214,92,255,0.16), transparent 70%),
    radial-gradient(closest-side at 78% 92%, rgba(0,255,157,0.12), transparent 70%),
    radial-gradient(closest-side at 20% 96%, rgba(255,181,46,0.10), transparent 72%),
    var(--bg);
}
body::after{
  content:'';position:fixed;inset:0;z-index:-1;opacity:.4;
  background-image:
    linear-gradient(rgba(255,255,255,0.022) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.022) 1px,transparent 1px);
  background-size:46px 46px;
  -webkit-mask-image:radial-gradient(ellipse 100% 80% at 50% 30%,#000 30%,transparent 90%);
          mask-image:radial-gradient(ellipse 100% 80% at 50% 30%,#000 30%,transparent 90%);
}

.wrap{max-width:1000px;margin:0 auto;padding:0 18px 70px}

/* ════════ HEADER ════════ */
.hd{
  display:flex;align-items:center;justify-content:space-between;
  gap:16px;padding:24px 0 18px;flex-wrap:wrap;
}
.brand{display:flex;flex-direction:column;gap:1px}
.brand-kicker{
  font-size:11px;font-weight:700;letter-spacing:.32em;text-transform:uppercase;
  color:var(--cyan);text-shadow:0 0 14px rgba(0,229,255,.55);
}
.brand-name{font-family:var(--font-display);font-size:23px;font-weight:700;letter-spacing:-.01em;color:var(--tx)}

/* clock */
.clock{
  background:var(--glass);
  border:1px solid var(--bd);
  border-radius:var(--r);
  padding:10px 16px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  text-align:right;min-width:172px;
  box-shadow:0 8px 30px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.05);
}
.clock-time{font-family:var(--font-display);
  font-size:27px;font-weight:700;line-height:1;letter-spacing:.02em;
  color:#fff;font-variant-numeric:tabular-nums;
  text-shadow:0 0 18px rgba(0,229,255,.6),0 0 4px rgba(0,229,255,.4);
}
.clock-time .sep{animation:blink 1s steps(1) infinite;color:var(--cyan)}
@keyframes blink{50%{opacity:.45}}
.clock-meta{
  font-size:11px;color:var(--tx-dim);margin-top:5px;
  letter-spacing:.01em;
}
.clock-zone{font-size:9.5px;color:var(--tx-faint);letter-spacing:.18em;text-transform:uppercase;margin-top:2px}

/* ════════ TABS ════════ */
.tabs{
  display:flex;gap:7px;margin:6px 0 26px;
  overflow-x:auto;padding-bottom:4px;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:0 0 auto;
  font-family:var(--font-display);font-size:14px;font-weight:700;
  color:var(--tx-dim);background:var(--glass);
  border:1px solid var(--bd);border-radius:999px;
  padding:9px 20px;cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;gap:8px;
  transition:color .22s,border-color .22s,background .22s,box-shadow .22s,transform .12s;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.tab .dot{width:8px;height:8px;border-radius:50%;background:var(--ac);
  box-shadow:0 0 10px var(--ac);transition:transform .22s}
.tab:hover{color:var(--tx);border-color:var(--bd-2);transform:translateY(-1px)}
.tab.active{
  color:#05060a;background:var(--ac);border-color:transparent;
  box-shadow:0 0 22px -2px var(--ac),0 0 50px -12px var(--ac);
}
.tab.active .dot{background:#05060a;box-shadow:none;transform:scale(1.25)}

/* ════════ PANELS ════════ */
.panel{display:none;animation:rise .5s cubic-bezier(.16,1,.3,1) both}
.panel.show{display:block}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.sec-title{font-family:var(--font-display);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;
  color:var(--tx-dim);margin:0 0 16px}
.sub-note{font-size:13px;color:var(--tx-faint);margin-bottom:18px}

/* generic glass card */
.card{
  background:var(--glass);border:1px solid var(--bd);border-radius:var(--r);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  box-shadow:0 10px 34px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.04);
}

/* ════════ SEMANA: day grid ════════ */
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:9px;margin-bottom:26px}
@media(max-width:600px){.day-grid{grid-template-columns:repeat(4,1fr)}}
.day{
  position:relative;border-radius:var(--r-sm);overflow:hidden;cursor:pointer;
  background:var(--glass);border:1px solid var(--bd);padding:11px 10px 13px;
  transition:transform .18s,border-color .22s,box-shadow .22s;
  animation:pop .45s cubic-bezier(.16,1,.3,1) both;
}
.day::after{content:'→';position:absolute;bottom:9px;right:10px;font-size:13px;font-weight:800;
  color:var(--ac);opacity:0;transform:translateX(-3px);transition:.2s;
  text-shadow:0 0 10px var(--ac)}
.day:hover::after,.day:focus-visible::after{opacity:1;transform:none}
.day:focus-visible{outline:2px solid var(--ac);outline-offset:2px}
.day:hover{transform:translateY(-3px);border-color:var(--ac);
  box-shadow:0 0 20px -6px var(--ac)}
.day .bar{position:absolute;top:0;left:0;right:0;height:3px;background:var(--ac);
  box-shadow:0 0 12px var(--ac)}
.day .dname{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx-faint)}
.day .dnum{font-family:var(--font-display);font-size:23px;font-weight:700;color:var(--tx);line-height:1.05;margin:3px 0 9px;font-variant-numeric:tabular-nums}
.day .tag{display:inline-block;font-size:10.5px;font-weight:700;border-radius:6px;
  padding:3px 8px;line-height:1.4;background:color-mix(in srgb,var(--ac) 16%,transparent);
  color:var(--ac);border:1px solid color-mix(in srgb,var(--ac) 35%,transparent)}
.day .ghost{display:inline-block;font-size:10px;font-weight:700;border-radius:6px;
  padding:2px 7px;margin-top:4px;color:var(--tx-faint);
  background:rgba(255,255,255,.04);border:1px solid var(--bd)}
.day .dtime{font-size:11px;color:var(--tx-faint);margin-top:6px;font-variant-numeric:tabular-nums}
.day.today{border-color:var(--ac);box-shadow:0 0 0 1px var(--ac),0 0 26px -6px var(--ac)}
.day .now{position:absolute;top:8px;right:8px;font-size:8px;font-weight:800;letter-spacing:.12em;
  color:var(--ac);text-shadow:0 0 10px var(--ac)}
@keyframes pop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}

/* routine cards */
.rout-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
@media(max-width:680px){.rout-grid{grid-template-columns:1fr}}
.rout{padding:18px 19px}
.rout .rtitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--ac);padding-bottom:11px;margin-bottom:13px;
  border-bottom:1px solid color-mix(in srgb,var(--ac) 22%,transparent)}
.rr{display:flex;gap:13px;font-size:13.5px;margin-bottom:10px;align-items:flex-start}
.rr:last-child{margin-bottom:0}
.rr .rt{font-weight:700;color:var(--ac);min-width:46px;flex-shrink:0;font-variant-numeric:tabular-nums}
.rr .rl{color:var(--tx)}
.rr .rsub{font-size:11px;color:var(--tx-faint);margin-top:2px}

/* ════════ TREINO ════════ */
.wk-select{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.wk-btn{
  flex:1 1 0;min-width:96px;cursor:pointer;font-family:var(--font);
  background:var(--glass);border:1px solid var(--bd);border-radius:var(--r-sm);
  padding:12px 14px;text-align:left;transition:.2s;
}
.wk-btn .wk-tag{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx-faint)}
.wk-btn .wk-name{font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--tx);margin-top:1px}
.wk-btn .wk-mus{font-size:10.5px;color:var(--tx-faint);margin-top:2px;line-height:1.3}
.wk-btn:hover{border-color:var(--ac);transform:translateY(-2px)}
.wk-btn.active{border-color:var(--ac);background:color-mix(in srgb,var(--ac) 12%,var(--glass));
  box-shadow:0 0 24px -8px var(--ac)}
.wk-btn.active .wk-name{color:var(--ac);text-shadow:0 0 16px color-mix(in srgb,var(--ac) 60%,transparent)}

/* tools */
.tools{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:18px}
@media(max-width:600px){.tools{grid-template-columns:1fr}}
.tool{padding:16px 17px}
.tool .tlabel{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--tx-dim);margin-bottom:9px;display:flex;align-items:center;gap:7px}
.tool .tlabel::before{content:'';width:7px;height:7px;border-radius:50%;
  background:var(--ac);box-shadow:0 0 10px var(--ac)}
.tdisplay{font-family:var(--font-display);font-size:42px;font-weight:700;line-height:1;color:#fff;font-variant-numeric:tabular-nums;
  letter-spacing:.01em;text-shadow:0 0 22px color-mix(in srgb,var(--ac) 55%,transparent);margin-bottom:13px}
.tdisplay.run{color:var(--ac)}
.tdisplay.warn{color:var(--pink);text-shadow:0 0 22px rgba(255,61,139,.6);animation:pulse .6s ease-in-out infinite}
@keyframes pulse{50%{opacity:.5}}
.tbtns{display:flex;gap:7px;flex-wrap:wrap}
.btn{
  font-family:var(--font);font-size:12.5px;font-weight:700;cursor:pointer;
  border-radius:8px;padding:7px 14px;color:var(--tx);
  background:rgba(255,255,255,.05);border:1px solid var(--bd-2);transition:.16s;
}
.btn:hover{background:rgba(255,255,255,.1);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn.go{background:var(--ac);color:#05060a;border-color:transparent;
  box-shadow:0 0 18px -4px var(--ac)}
.btn.go:hover{box-shadow:0 0 26px -3px var(--ac)}
.btn.sm{padding:6px 11px;font-size:11.5px}
.preset{display:flex;gap:6px;margin-bottom:11px;flex-wrap:wrap}
.chip{
  font-family:var(--font);font-size:11.5px;font-weight:700;cursor:pointer;
  border-radius:7px;padding:5px 11px;color:var(--tx-dim);
  background:rgba(255,255,255,.04);border:1px solid var(--bd);transition:.16s;font-variant-numeric:tabular-nums;
}
.chip:hover{color:var(--tx);border-color:var(--bd-2)}
.chip.active{color:var(--ac);border-color:var(--ac);
  background:color-mix(in srgb,var(--ac) 12%,transparent);box-shadow:0 0 14px -5px var(--ac)}

/* progress */
.prog-wrap{margin-bottom:18px}
.prog-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.prog-head .plabel{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx-dim)}
.prog-head .ppct{font-size:14px;font-weight:700;color:var(--ac);font-variant-numeric:tabular-nums;
  text-shadow:0 0 14px color-mix(in srgb,var(--ac) 55%,transparent)}
.prog-track{height:9px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden;
  border:1px solid var(--bd)}
.prog-fill{height:100%;width:0;border-radius:999px;background:var(--ac);
  box-shadow:0 0 16px var(--ac);transition:width .45s cubic-bezier(.16,1,.3,1)}

/* exercise list */
.ex-card{overflow:hidden;margin-bottom:13px}
.ex-head{padding:14px 17px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:color-mix(in srgb,var(--ac) 9%,transparent)}
.ex-head .eh-name{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--ac);
  text-shadow:0 0 16px color-mix(in srgb,var(--ac) 45%,transparent)}
.ex-head .eh-mus{font-size:10.5px;color:var(--tx-dim);margin-top:1px}
.ex-head .eh-day{font-size:11px;font-weight:700;color:var(--tx-dim);text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.ex-body{padding:7px 17px 15px}
.ex-sec{margin-top:11px}
.ex-sec .esec-lbl{font-size:9.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;
  color:var(--tx-faint);margin-bottom:7px}
.exr{display:flex;align-items:center;gap:12px;padding:8px 0;border-top:1px solid rgba(255,255,255,.045)}
.exr:first-child{border-top:none}
.exr .exname{flex:1;font-size:14px;color:var(--tx);line-height:1.25}
.exr.done .exname{color:var(--tx-faint);text-decoration:line-through;text-decoration-color:color-mix(in srgb,var(--ac) 60%,transparent)}
.exr .extarget{font-size:11px;font-weight:700;color:var(--tx-dim);font-variant-numeric:tabular-nums;flex-shrink:0;min-width:42px;text-align:right}
.sets{display:flex;gap:6px;flex-shrink:0}
.setdot{
  width:30px;height:30px;border-radius:50%;cursor:pointer;flex-shrink:0;
  border:1.5px solid var(--bd-2);background:rgba(255,255,255,.03);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:var(--tx-faint);
  transition:.18s;position:relative;-webkit-tap-highlight-color:transparent;
}
.setdot:hover{border-color:var(--ac)}
.setdot.on{
  background:var(--ac);border-color:var(--ac);color:#05060a;
  box-shadow:0 0 14px -1px var(--ac);transform:scale(1.05);
}
.setdot.on::after{content:'✓'}
.setdot.on .snum{display:none}

.reset-row{display:flex;justify-content:flex-end;margin-top:6px}
.btn.danger{color:var(--pink);border-color:color-mix(in srgb,var(--pink) 45%,transparent);
  background:color-mix(in srgb,var(--pink) 10%,transparent)}
.btn.danger:hover{background:color-mix(in srgb,var(--pink) 18%,transparent);
  box-shadow:0 0 18px -6px var(--pink)}

/* estudos / leitura big cards */
.feature{padding:24px 24px}
.feature .fhead{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.feature .fname{font-family:var(--font-display);font-size:30px;font-weight:700;color:var(--ac);letter-spacing:-.01em;
  text-shadow:0 0 28px color-mix(in srgb,var(--ac) 45%,transparent)}
.feature .fmeta{font-size:13px;color:var(--tx-dim);margin-top:4px}
.feature .fbadge{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ac);background:color-mix(in srgb,var(--ac) 13%,transparent);
  border:1px solid color-mix(in srgb,var(--ac) 32%,transparent);border-radius:999px;padding:6px 14px;font-variant-numeric:tabular-nums}
.feature .fdesc{font-size:14px;color:var(--tx-dim);margin-top:14px;line-height:1.6;max-width:60ch}
.fdivider{height:1px;background:var(--bd);margin:22px 0}
.blocks{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
.block{flex:1 1 130px;background:rgba(255,255,255,.03);border:1px solid var(--bd);
  border-radius:var(--r-sm);padding:13px 15px}
.block .bk-h{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ac);margin-bottom:5px}
.block .bk-t{font-size:14px;color:var(--tx)}

.foot{margin-top:40px;text-align:center;font-size:11.5px;color:var(--tx-faint);letter-spacing:.02em}
.foot a{color:var(--tx-dim);text-decoration:none;border-bottom:1px solid var(--bd-2)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* ================================================================
   ╔═╗╔═╗╔╗╔╔═╗╦╔═╗
   ║  ║ ║║║║╠╣ ║║ ╦
   ╚═╝╚═╝╝╚╝╚  ╩╚═╝
   Edite APENAS este bloco. O motor abaixo cuida do resto.

   CORES (campo "cor"):
     "push"    → ciano    | "pull"    → verde
     "legs"    → âmbar     | "estudo"  → magenta
     "leitura" → lima      | "neutro"  → cinza
================================================================ */

      { hora:"20h00", texto:"Jantar · descanso" },
      { hora:"23h00", texto:"Sono" },
    ]},
    { titulo:"ESTUDOS — TER · QUI", cor:"estudo", linhas:[
      { hora:"07h30", texto:"Trabalho" },
      { hora:"17h30", texto:"Saída · jantar" },
      { hora:"19h00", texto:"Estudos (≈ 2h)" },
      { hora:"21h00", texto:"Descanso livre" },
      { hora:"23h00", texto:"Sono" },
    ]},
    { titulo:"LEITURA E LAZER — SÁB · DOM", cor:"leitura", linhas:[
      { hora:"Manhã", texto:"Leitura" },
      { hora:"Tarde", texto:"Lazer · atividades livres" },
      { hora:"Noite", texto:"Descanso completo" },
    ]},
  ],

  // ── Fichas de treino (tracker interativo) ──
  // exercícios: ["Nome","Séries×Reps"] — o número antes do × vira os checkpoints
  treinos: [
    { tag:"Treino A", nome:"Push", dia:"Segunda · 18h30", cor:"push",
      grupos:"Peito · Ombros · Tríceps", secoes:[
      { nome:"Aquecimento", exercicios:[["Panturrilha em pé","3×12"]] },
      { nome:"Principal", exercicios:[
        ["Supino Reto c/ Halteres","3×12"],
        ["Crucifixo no Banco","3×12"],
        ["Elevação Lateral","3×12"],
        ["Elevação Frontal","3×12"],
        ["Tríceps Máquina","3×12"],
        ["Tríceps Corda","3×12"],
      ]},
      { nome:"Core", exercicios:[["Abdominal Supra","4×15"]] },
      { nome:"Aeróbico", exercicios:[["Cardio (esteira)","20 min"]] },
    ]},
    { tag:"Treino B", nome:"Pull", dia:"Quarta · 18h30", cor:"pull",
      grupos:"Costas · Trapézio · Bíceps · Antebraço", secoes:[
      { nome:"Aquecimento", exercicios:[["Panturrilha em pé","3×12"]] },
      { nome:"Principal", exercicios:[
        ["Puxada Frontal (pronada)","4×15"],
        ["Remada Alta (máquina)","3×12"],
        ["Encolhimento (máquina)","3×12"],

const TZ = CONFIG.fuso || "America/Sao_Paulo";

/* persistência tolerante a falhas (funciona no GitHub Pages; ignora erros) */
const store = {
  get(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} },
};

/* ── tempo Brasília ── */
function nowParts(){
  const t = new Intl.DateTimeFormat('pt-BR',{timeZone:TZ,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).formatToParts(new Date());
  const g = ty => (t.find(p=>p.type===ty)||{}).value||'00';
  return { h:g('hour'), m:g('minute'), s:g('second') };
}
function nowDateStr(){
  const s = new Intl.DateTimeFormat('pt-BR',{timeZone:TZ,weekday:'long',day:'2-digit',month:'long'}).format(new Date());
  return s.charAt(0).toUpperCase()+s.slice(1);
}
function brasiliaToday(){
  const p = new Intl.DateTimeFormat('en-CA',{timeZone:TZ,year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(new Date());
  const v = ty => +(p.find(x=>x.type===ty).value);
  return new Date(v('year'), v('month')-1, v('day'), 12, 0, 0);
}

/* ── helpers ── */
function setCount(target){
  const m = String(target).match(/^(\d+)\s*[×xX]/);
  return m ? Math.min(parseInt(m[1],10), 8) : 1;
}

      : `<span class="tag">${d.atividade}</span><div class="dtime">${d.horario}</div>`;

/* ════════ CLOCK ════════ */
function tickClock(){
  const p = nowParts();
  $('#ch').textContent=p.h; $('#cm').textContent=p.m; $('#cs').textContent=p.s;
  $('#cdate').textContent = nowDateStr();
}

/* ════════ TABS ════════ */
const PANELS={semana:'#p-semana',treino:'#p-treino',estudos:'#p-estudos',leitura:'#p-leitura'};
function switchTab(name){
  if(!PANELS[name]) name='semana';
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===name));
  Object.values(PANELS).forEach(sel=>$(sel).classList.remove('show'));
  const panel=$(PANELS[name]); void panel.offsetWidth; panel.classList.add('show');
}
function initTabs(){
  document.querySelectorAll('.tab').forEach(tab=>tab.addEventListener('click',()=>switchTab(tab.dataset.tab)));
}

/* ════════ NAVEGAÇÃO PELOS CARDS DE DIA ════════ */
function dayTarget(d){
  if(['push','pull','legs'].includes(d.cor)){
    const idx=CONFIG.treinos.findIndex(t=>t.cor===d.cor);
    return {tab:'treino', wk: idx>=0?idx:0};
  }
  if(d.cor==='estudo')  return {tab:'estudos'};
  if(d.cor==='leitura') return {tab:'leitura'};
  return {tab:'semana'};
}
function initDays(){
  document.querySelectorAll('.day').forEach(el=>{
    const d=CONFIG.dias[+el.dataset.day];
    const tgt=dayTarget(d);
    const labelTab={treino:'Treino',estudos:'Estudos',leitura:'Leitura',semana:'Semana'}[tgt.tab];
    el.setAttribute('role','button');
    el.setAttribute('tabindex','0');
    el.setAttribute('aria-label', d.label+' — ir para '+labelTab);
    const go=()=>{
      switchTab(tgt.tab);
      if(tgt.tab==='treino' && tgt.wk!=null) selectWorkout(tgt.wk);
      window.scrollTo({top:0,behavior:'smooth'});
    };
    el.addEventListener('click',go);
    el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();go();}});
  });
}

/* ════════ WORKOUT TRACKER ════════ */
let curWk = 0;
function wkKey(i){ return 'rotina_treino_'+CONFIG.treinos[i].tag.replace(/\s+/g,'_'); }
function getDone(i){ return store.get(wkKey(i)) || {}; }
function setDone(i,obj){ store.set(wkKey(i),obj); }

function renderWorkout(i){
  curWk=i;
  const t=CONFIG.treinos[i];
  const done=getDone(i);
  let exIdx=0;
  const secs=t.secoes.map(sec=>{
    const rows=sec.exercicios.map(([name,target])=>{
      const n=setCount(target);
      const myIdx=exIdx++;
      const dots=Array.from({length:n},(_,k)=>{
        const on = done[myIdx+'-'+k];
        return `<button class="setdot ${on?'on':''}" data-ex="${myIdx}" data-set="${k}" aria-label="Série ${k+1} de ${name}" aria-pressed="${on?'true':'false'}"><span class="snum">${k+1}</span></button>`;
      }).join('');
      const allDone = Array.from({length:n}).every((_,k)=>done[myIdx+'-'+k]);
      return `<div class="exr ${allDone?'done':''}" data-row="${myIdx}">
        <span class="exname">${name}</span>
        <span class="extarget">${target}</span>
        <span class="sets">${dots}</span>
      </div>`;
    }).join('');
    return `<div class="ex-sec"><div class="esec-lbl">${sec.nome}</div>${rows}</div>`;
  }).join('');

  $('#wk-body').innerHTML=`<div class="card ex-card ${ccls(t.cor)}">
    <div class="ex-head">
      <div><div class="eh-name">${t.nome}</div><div class="eh-mus">${t.grupos}</div></div>
      <div class="eh-day">${t.dia}</div>
    </div>
    <div class="ex-body">${secs}</div>
  </div>`;

  // recolorir elementos que seguem o acento do treino selecionado
  const cls=ccls(t.cor);
  document.querySelectorAll('#p-treino .tool, #p-treino .prog-wrap').forEach(el=>{
    el.classList.remove('push','pull','legs','estudo','leitura','neutro');
    el.classList.add(cls);
  });

  bindDots();
  updateProgress();
}

function bindDots(){
  $('#wk-body').querySelectorAll('.setdot').forEach(dot=>{
    dot.addEventListener('click',()=>{
      const done=getDone(curWk);
      const key=dot.dataset.ex+'-'+dot.dataset.set;
      if(done[key]){ delete done[key]; dot.classList.remove('on'); dot.setAttribute('aria-pressed','false'); }
      else { done[key]=true; dot.classList.add('on'); dot.setAttribute('aria-pressed','true'); }
      setDone(curWk,done);
      // update row strike
      const row=dot.closest('.exr');
      const dots=[...row.querySelectorAll('.setdot')];
      row.classList.toggle('done', dots.every(d=>d.classList.contains('on')));
      updateProgress();
    });
  });
}

function updateProgress(){
  const t=CONFIG.treinos[curWk];
  let total=0; t.secoes.forEach(s=>s.exercicios.forEach(([,tg])=>total+=setCount(tg)));
  const done=getDone(curWk);
  const completed=Object.keys(done).filter(k=>done[k]).length;
  const pct= total? Math.round(completed/total*100):0;
  $('#prog-fill').style.width=pct+'%';
  $('#prog-pct').textContent=pct+'%';
}

function selectWorkout(i){
  document.querySelectorAll('.wk-btn').forEach(b=>b.classList.toggle('active', +b.dataset.wk===i));
  renderWorkout(i);
}
function initWorkout(){
  document.querySelectorAll('.wk-btn').forEach(btn=>{
    btn.addEventListener('click',()=>selectWorkout(+btn.dataset.wk));
  });
  $('#wk-reset').addEventListener('click',()=>{
    if(confirm('Resetar todas as marcações de '+CONFIG.treinos[curWk].nome+'?')){
      setDone(curWk,{});
      renderWorkout(curWk);
    }
  });
  renderWorkout(0);
}

/* ════════ BEEP ════════ */
let actx=null;
function beep(){
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.type='sine'; o.frequency.value=880;
    g.gain.setValueAtTime(0.001,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.4,actx.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.5);
    o.start(); o.stop(actx.currentTime+0.5);
  }catch(e){}
}

/* ════════ STOPWATCH (conta pra cima) ════════ */
function makeStopwatch(dispId,toggleId,resetId){
  let secs=0, timer=null, running=false;
  const disp=$(dispId), tog=$(toggleId), rst=$(resetId);
  const fmt=s=>{const m=Math.floor(s/60),x=s%60;return String(m).padStart(2,'0')+':'+String(x).padStart(2,'0');};
  const paint=()=>disp.textContent=fmt(secs);
  tog.addEventListener('click',()=>{
    running=!running;
    if(running){tog.textContent='Pausar';tog.classList.remove('go');disp.classList.add('run');
      timer=setInterval(()=>{secs++;paint();},1000);}
    else{tog.textContent='Continuar';tog.classList.add('go');disp.classList.remove('run');clearInterval(timer);}
  });
  rst.addEventListener('click',()=>{running=false;clearInterval(timer);secs=0;paint();
    tog.textContent='Iniciar';tog.classList.add('go');disp.classList.remove('run');});
  paint();
}

/* ════════ COUNTDOWN (conta pra baixo, com presets + beep) ════════ */
function makeCountdown(dispId,toggleId,resetId,presetSel,attr,startVal,toggleLabel){
  let total=startVal, left=startVal, timer=null, running=false;
  const disp=$(dispId), tog=$(toggleId), rst=$(resetId), presets=presetSel?$(presetSel):null;
  const fmt=s=>{const m=Math.floor(s/60),x=s%60;return String(m).padStart(2,'0')+':'+String(x).padStart(2,'0');};
  const paint=()=>{disp.textContent=fmt(left);};
  const stop=()=>{running=false;clearInterval(timer);tog.textContent=toggleLabel;tog.classList.add('go');disp.classList.remove('run');};
  tog.addEventListener('click',()=>{
    if(running){stop();return;}
    if(left<=0)left=total;
    running=true;tog.textContent='Pausar';tog.classList.remove('go');disp.classList.add('run');disp.classList.remove('warn');
    timer=setInterval(()=>{
      left--;paint();
      if(left<=0){clearInterval(timer);running=false;tog.textContent=toggleLabel;tog.classList.add('go');
        disp.classList.remove('run');disp.classList.add('warn');beep();
        setTimeout(()=>{disp.classList.remove('warn');left=total;paint();},2500);}
    },1000);
  });
  rst.addEventListener('click',()=>{stop();disp.classList.remove('warn');left=total;paint();});
  if(presets){
    presets.querySelectorAll('.chip').forEach(ch=>ch.addEventListener('click',()=>{
      presets.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
      ch.classList.add('active');
      const v=attr==='min'?(+ch.dataset.min*60):(+ch.dataset.sec);
      total=v;left=v;stop();disp.classList.remove('warn');paint();
    }));
  }
  paint();
}

/* ════════ BOOT ════════ */
function boot(){
  document.getElementById('app').innerHTML=shell();
  document.title='Rotina Semanal — '+CONFIG.nome;
  tickClock(); setInterval(tickClock,1000);
  initTabs();
  initDays();
  initWorkout();
  makeStopwatch('#sw-disp','#sw-toggle','#sw-reset');
  makeCountdown('#rt-disp','#rt-toggle','#rt-reset','#rt-presets','sec',30,'Iniciar');
  makeCountdown('#fc-disp','#fc-toggle','#fc-reset','#fc-presets','min',CONFIG.estudos.foco_min*60,'Iniciar foco');
  makeStopwatch('#rd-disp','#rd-toggle','#rd-reset');
}
document.addEventListener('DOMContentLoaded',boot);
